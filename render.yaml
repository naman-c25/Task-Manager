# Render Blueprint for the TaskFlow backend (PostgreSQL + Redis).
# Deploy from the repo root: Render reads this file and provisions the services.
services:
  - type: web
    name: taskflow-api
    runtime: node
    rootDir: backend
    plan: free
    # `--include=dev` forces devDependencies (TypeScript + @types/*) to install
    # even though NODE_ENV=production, since they're required to compile. The
    # runtime (`npm start`) only needs the already-installed prod deps.
    buildCommand: npm install --include=dev && npm run build && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_ACCESS_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: USER_CACHE_TTL
        value: 300
      # Paste your Neon connection string in the Render dashboard (Environment).
      # Use Neon's DIRECT (non-pooled) URL with ?sslmode=require.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: taskflow-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      # Set to your deployed frontend URL in the dashboard.
      - key: CLIENT_ORIGIN
        sync: false

  # Render Key Value store (Redis-compatible).
  - type: redis
    name: taskflow-redis
    plan: free
    ipAllowList: []
