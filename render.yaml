# Render Blueprint for the TaskFlow backend (PostgreSQL + Redis).
# Deploy from the repo root: Render reads this file and provisions the services.
services:
  - type: web
    name: taskflow-api
    runtime: node
    rootDir: backend
    plan: free
    # `build` runs `prisma generate && tsc`; then apply pending migrations.
    buildCommand: npm install && npm run build && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_ACCESS_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: USER_CACHE_TTL
        value: 300
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: taskflow-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      # Set to your deployed frontend URL in the dashboard.
      - key: CLIENT_ORIGIN
        sync: false

  # Render Key Value store (Redis-compatible).
  - type: redis
    name: taskflow-redis
    plan: free
    ipAllowList: []

databases:
  - name: taskflow-db
    plan: free
